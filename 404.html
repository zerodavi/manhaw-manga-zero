<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#00c853">
<title>Chat Online</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial,sans-serif;
background:#111;
color:#fff;
display:flex;
flex-direction:column;
height:100vh;
height:100dvh;
overflow:hidden;
position:fixed;
width:100%;
}

/* TELA CADASTRO */
#loginTela{
position:fixed;
inset:0;
background:linear-gradient(135deg,#0f0f0f,#1c1c1c);
display:flex;
justify-content:center;
align-items:flex-start;
z-index:999;
padding:16px;
overflow-y:auto;
-webkit-overflow-scrolling:touch;
}

#loginBox{
background:#1f1f1f;
padding:24px 20px;
border-radius:18px;
width:100%;
max-width:380px;
margin:auto;
box-shadow:0 0 25px rgba(0,0,0,.5);
text-align:center;
}

#loginBox h1{
font-size:28px;
margin-bottom:10px;
color:#00c853;
}

#loginBox p{
font-size:14px;
color:#aaa;
margin-bottom:20px;
}

#nomeInput{
width:100%;
padding:14px;
border:none;
border-radius:10px;
font-size:16px;
margin-bottom:20px;
outline:none;
background:#2a2a2a;
color:#fff;
}

/* SELEÇÃO DE ÍCONES */
.icones-titulo{
font-size:13px;
color:#aaa;
margin-bottom:12px;
text-align:left;
}

#iconeGrid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:12px;
margin-bottom:20px;
}

.icone-opcao{
cursor:pointer;
border-radius:50%;
border:3px solid transparent;
transition:border-color .2s, transform .2s;
aspect-ratio:1;
overflow:hidden;
}

.icone-opcao img{
width:100%;
height:100%;
object-fit:cover;
border-radius:50%;
display:block;
}

.icone-opcao:hover{
border-color:#00c853;
transform:scale(1.08);
}

.icone-opcao.selecionado{
border-color:#00c853;
box-shadow:0 0 10px rgba(0,200,83,.5);
}

#entrarBtn{
width:100%;
padding:14px;
border:none;
border-radius:10px;
font-size:16px;
font-weight:bold;
background:#00c853;
color:#fff;
cursor:pointer;
transition:opacity .2s;
}

#entrarBtn:hover{
opacity:.9;
}

/* CHAT */
header{
background:#00c853;
padding:10px 14px;
padding-top:max(10px, env(safe-area-inset-top));
display:flex;
justify-content:space-between;
align-items:center;
font-size:16px;
font-weight:bold;
gap:10px;
flex-shrink:0;
}

#headerPerfil{
display:flex;
align-items:center;
gap:10px;
}

#headerAvatar{
width:34px;
height:34px;
border-radius:50%;
object-fit:cover;
border:2px solid rgba(255,255,255,.4);
flex-shrink:0;
}

#chat{
flex:1;
overflow-y:auto;
-webkit-overflow-scrolling:touch;
padding:10px 10px;
display:flex;
flex-direction:column;
gap:8px;
}

.msg{
display:flex;
align-items:flex-end;
gap:6px;
max-width:88%;
}

.msg.eu{
align-self:flex-end;
flex-direction:row-reverse;
}

.msg.outro{
align-self:flex-start;
}

.msg-avatar{
width:28px;
height:28px;
border-radius:50%;
object-fit:cover;
flex-shrink:0;
border:2px solid #333;
}

.msg.eu .msg-avatar{
border-color:#00c853;
}

.msg-bubble{
padding:8px 12px;
border-radius:12px;
word-break:break-word;
max-width:100%;
font-size:15px;
line-height:1.4;
}

.eu .msg-bubble{
background:#00c853;
border-bottom-right-radius:4px;
}

.outro .msg-bubble{
background:#333;
border-bottom-left-radius:4px;
}

.msg-nome{
font-size:11px;
color:#aaa;
margin-bottom:3px;
}

.eu .msg-nome{
text-align:right;
}

footer{
display:flex;
gap:8px;
padding:8px 10px;
padding-bottom:max(8px, env(safe-area-inset-bottom));
background:#222;
flex-shrink:0;
}

#msg{
flex:1;
padding:10px 12px;
border:none;
border-radius:22px;
font-size:16px;
outline:none;
background:#333;
color:#fff;
-webkit-appearance:none;
}

footer button{
width:44px;
height:44px;
border:none;
border-radius:50%;
background:#00c853;
color:#fff;
cursor:pointer;
font-weight:bold;
font-size:18px;
display:flex;
align-items:center;
justify-content:center;
flex-shrink:0;
-webkit-tap-highlight-color:transparent;
touch-action:manipulation;
}

footer button:active{
opacity:.75;
transform:scale(.94);
}

#headerBtns{
display:flex;
gap:6px;
}

#headerBtns button{
padding:6px 10px;
border:none;
border-radius:8px;
background:rgba(0,0,0,.2);
color:#fff;
cursor:pointer;
font-size:12px;
font-weight:bold;
-webkit-tap-highlight-color:transparent;
touch-action:manipulation;
}

#headerBtns button:active{
opacity:.7;
}
</style>
</head>
<body>

<!-- TELA LOGIN -->
<div id="loginTela">
<div id="loginBox">
<h1>Chat Online</h1>
<p>Escolha um ícone e digite seu nome</p>

<p class="icones-titulo">Escolha seu ícone de perfil:</p>
<div id="iconeGrid">
  <div class="icone-opcao selecionado" data-icone="perfil/icone1.png" onclick="selecionarIcone(this)">
    <img src="perfil/icone1.png" alt="Ícone 1" onerror="this.parentElement.innerHTML='<span style=font-size:30px;line-height:60px>🐱</span>'">
  </div>
  <div class="icone-opcao" data-icone="perfil/icone2.png" onclick="selecionarIcone(this)">
    <img src="perfil/icone2.png" alt="Ícone 2" onerror="this.parentElement.innerHTML='<span style=font-size:30px;line-height:60px>🐶</span>'">
  </div>
  <div class="icone-opcao" data-icone="perfil/icone3.png" onclick="selecionarIcone(this)">
    <img src="perfil/icone3.png" alt="Ícone 3" onerror="this.parentElement.innerHTML='<span style=font-size:30px;line-height:60px>🦊</span>'">
  </div>
  <div class="icone-opcao" data-icone="perfil/icone4.png" onclick="selecionarIcone(this)">
    <img src="perfil/icone4.png" alt="Ícone 4" onerror="this.parentElement.innerHTML='<span style=font-size:30px;line-height:60px>🐻</span>'">
  </div>
</div>

<input type="text" id="nomeInput" placeholder="Seu nome">
<button id="entrarBtn" onclick="salvarNome()">Entrar no Chat</button>
<button id="cancelarBtn" onclick="cancelarEdicao()" style="display:none;width:100%;padding:12px;margin-top:10px;border:2px solid #333;border-radius:10px;font-size:15px;font-weight:bold;background:transparent;color:#aaa;cursor:pointer;">← Cancelar</button>
</div>
</div>

<header>
<div id="headerPerfil">
  <img id="headerAvatar" src="" alt="avatar">
  <span id="titulo"></span>
</div>
<div id="headerBtns">
  <button onclick="trocarNome()">✏️ Nome</button>
</div>
</header>

<div id="chat"></div>

<footer>
<input type="text" id="msg" placeholder="Digite mensagem..." autocomplete="off">
<button onclick="enviar()">➤</button>
</footer>

<script>
const url = "https://swenhgmatpxuqjhdghuv.supabase.co";
const key = "sb_publishable__kkMzLJQtt_My1sPZZ35hw_vpsJV4HN";

const cliente = supabase.createClient(url, key);

const chat = document.getElementById("chat");
const campo = document.getElementById("msg");

let nome = localStorage.getItem("nome");
let icone = localStorage.getItem("icone") || "perfil/icone1.png";
let iconeSelecionado = icone;

// Marcar ícone salvo como selecionado
document.querySelectorAll(".icone-opcao").forEach(el => {
  if(el.dataset.icone === icone){
    document.querySelectorAll(".icone-opcao").forEach(e => e.classList.remove("selecionado"));
    el.classList.add("selecionado");
  }
});

function selecionarIcone(el){
  document.querySelectorAll(".icone-opcao").forEach(e => e.classList.remove("selecionado"));
  el.classList.add("selecionado");
  iconeSelecionado = el.dataset.icone;
}

if(nome && nome.trim() !== ""){
  document.getElementById("loginTela").style.display = "none";
  iniciarChat();
}

function salvarNome(){
  let valor = document.getElementById("nomeInput").value.trim();
  if(valor === "") return;
  nome = valor;
  icone = iconeSelecionado;
  localStorage.setItem("nome", nome);
  localStorage.setItem("icone", icone);
  document.getElementById("loginTela").style.display = "none";
  document.getElementById("cancelarBtn").style.display = "none";
  document.getElementById("entrarBtn").textContent = "Entrar no Chat";
  document.getElementById("titulo").innerText = "Chat - " + nome;
  document.getElementById("headerAvatar").src = icone;
  if(!document.getElementById("chat").children.length){
    iniciarChat();
  }
}

function trocarNome(){
  document.getElementById("nomeInput").value = nome || "";
  document.getElementById("entrarBtn").textContent = "Salvar";
  document.getElementById("cancelarBtn").style.display = "block";
  document.getElementById("loginTela").style.display = "flex";
  document.getElementById("nomeInput").focus();
}

function cancelarEdicao(){
  document.getElementById("loginTela").style.display = "none";
  document.getElementById("cancelarBtn").style.display = "none";
  document.getElementById("entrarBtn").textContent = "Entrar no Chat";
}

function iniciarChat(){
  document.getElementById("titulo").innerText = "Chat - " + nome;
  document.getElementById("headerAvatar").src = icone;

  carregar();

  cliente
    .channel("sala1")
    .on(
      "postgres_changes",
      { event: "INSERT", schema: "public", table: "mensagens" },
      (payload) => {
        mostrar(payload.new.nome, payload.new.texto, payload.new.id, payload.new.icone);
      }
    )
    .subscribe();
}

function mostrar(usuario, texto, id, iconeUsuario){
  if(document.getElementById("msg_" + id)) return;

  const sou_eu = usuario === nome;
  const avatarSrc = iconeUsuario || "perfil/icone1.png";

  let div = document.createElement("div");
  div.id = "msg_" + id;
  div.className = "msg " + (sou_eu ? "eu" : "outro");

  div.innerHTML = `
    <img class="msg-avatar" src="${avatarSrc}" alt="${usuario}" onerror="this.style.display='none'">
    <div>
      <div class="msg-nome">${sou_eu ? "Você" : usuario}</div>
      <div class="msg-bubble">${texto}</div>
    </div>
  `;

  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

async function carregar(){
  chat.innerHTML = "";

  const { data } = await cliente
    .from("mensagens")
    .select("*")
    .order("id", { ascending: true });

  if(data) data.forEach(item => {
    mostrar(item.nome, item.texto, item.id, item.icone);
  });
}

async function enviar(){
  let texto = campo.value.trim();
  if(texto === "") return;
  campo.value = "";

  await cliente
    .from("mensagens")
    .insert([{ nome: nome, texto: texto, icone: icone }]);
}

campo.addEventListener("keydown", function(e){
  if(e.key === "Enter") enviar();
});

document.getElementById("nomeInput").addEventListener("keydown", function(e){
  if(e.key === "Enter") salvarNome();
});

// Corrige altura no Android quando teclado abre/fecha
if(window.visualViewport){
  window.visualViewport.addEventListener("resize", () => {
    const h = window.visualViewport.height;
    document.body.style.height = h + "px";
    chat.scrollTop = chat.scrollHeight;
  });
}
</script>

</body>
</html>
