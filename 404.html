<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Chat Supabase</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
margin:0;
font-family:Arial;
background:#111;
color:#fff;
display:flex;
flex-direction:column;
height:100vh;
}
header{
background:#222;
padding:15px;
text-align:center;
font-size:22px;
font-weight:bold;
}
#chat{
flex:1;
overflow-y:auto;
padding:10px;
display:flex;
flex-direction:column;
gap:10px;
}
.msg{
padding:10px;
border-radius:10px;
max-width:80%;
word-wrap:break-word;
}
.eu{
background:#00c853;
align-self:flex-end;
}
.outro{
background:#333;
align-self:flex-start;
}
footer{
display:flex;
padding:10px;
gap:10px;
background:#222;
}
input{
flex:1;
padding:12px;
border:none;
border-radius:8px;
font-size:16px;
}
button{
padding:12px 18px;
border:none;
border-radius:8px;
background:#00c853;
color:#fff;
font-size:16px;
cursor:pointer;
}
button:hover{
background:#00a844;
}
</style>
</head>
<body>

<header>Chat Online</header>

<div id="chat"></div>

<footer>
<input type="text" id="msg" placeholder="Digite mensagem">
<button onclick="enviar()">Enviar</button>
</footer>

<script>
const supabaseUrl = "https://swenhgmatpxuqjhdghuv.supabase.co";
const supabaseKey = "sb_publishable__kkMzLJQtt_My1sPZZ35hw_vpsJV4HN";

const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

const chat = document.getElementById("chat");

let nome = localStorage.getItem("nome");

if(!nome){
nome = prompt("Seu nome:");
localStorage.setItem("nome", nome);
}

async function carregarMensagens(){
chat.innerHTML = "";

const { data, error } = await supabase
.from("mensagens")
.select("*")
.order("id",{ascending:true});

if(error){
console.log(error);
return;
}

data.forEach(item=>{
mostrar(item.nome,item.texto);
});

chat.scrollTop = chat.scrollHeight;
}

function mostrar(user,texto){
let div = document.createElement("div");
div.className = "msg " + (user===nome ? "eu":"outro");
div.innerHTML = "<b>"+user+":</b><br>"+texto;
chat.appendChild(div);
}

async function enviar(){
let texto = document.getElementById("msg").value.trim();

if(texto=="") return;

const { error } = await supabase
.from("mensagens")
.insert([
{
nome:nome,
texto:texto
}
]);

if(!error){
document.getElementById("msg").value="";
}
}

supabase
.channel("room1")
.on(
"postgres_changes",
{
event:"INSERT",
schema:"public",
table:"mensagens"
},
payload=>{
mostrar(payload.new.nome,payload.new.texto);
chat.scrollTop = chat.scrollHeight;
}
)
.subscribe();

carregarMensagens();
</script>

</body>
</html>
