<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Chat Online</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial,sans-serif;
background:#111;
color:#fff;
display:flex;
flex-direction:column;
height:100vh;
}

/* TELA CADASTRO */
#loginTela{
position:fixed;
inset:0;
background:linear-gradient(135deg,#0f0f0f,#1c1c1c);
display:flex;
justify-content:center;
align-items:center;
z-index:999;
padding:20px;
}

#loginBox{
background:#1f1f1f;
padding:30px;
border-radius:18px;
width:100%;
max-width:380px;
box-shadow:0 0 25px rgba(0,0,0,.5);
text-align:center;
}

#loginBox h1{
font-size:28px;
margin-bottom:10px;
color:#00c853;
}

#loginBox p{
font-size:14px;
color:#aaa;
margin-bottom:20px;
}

#nomeInput{
width:100%;
padding:14px;
border:none;
border-radius:10px;
font-size:16px;
margin-bottom:20px;
outline:none;
background:#2a2a2a;
color:#fff;
}

/* SELEÇÃO DE ÍCONES */
.icones-titulo{
font-size:13px;
color:#aaa;
margin-bottom:12px;
text-align:left;
}

#iconeGrid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:12px;
margin-bottom:20px;
}

.icone-opcao{
cursor:pointer;
border-radius:50%;
border:3px solid transparent;
transition:border-color .2s, transform .2s;
aspect-ratio:1;
overflow:hidden;
}

.icone-opcao img{
width:100%;
height:100%;
object-fit:cover;
border-radius:50%;
display:block;
}

.icone-opcao:hover{
border-color:#00c853;
transform:scale(1.08);
}

.icone-opcao.selecionado{
border-color:#00c853;
box-shadow:0 0 10px rgba(0,200,83,.5);
}

#entrarBtn{
width:100%;
padding:14px;
border:none;
border-radius:10px;
font-size:16px;
font-weight:bold;
background:#00c853;
color:#fff;
cursor:pointer;
transition:opacity .2s;
}

#entrarBtn:hover{
opacity:.9;
}

/* CHAT */
header{
background:#00c853;
padding:10px 14px;
display:flex;
justify-content:space-between;
align-items:center;
font-size:18px;
font-weight:bold;
gap:10px;
}

#headerPerfil{
display:flex;
align-items:center;
gap:10px;
}

#headerAvatar{
width:38px;
height:38px;
border-radius:50%;
object-fit:cover;
border:2px solid rgba(255,255,255,.4);
flex-shrink:0;
}

#chat{
flex:1;
overflow-y:auto;
padding:15px;
display:flex;
flex-direction:column;
gap:10px;
}

.msg{
display:flex;
align-items:flex-end;
gap:8px;
max-width:85%;
}

.msg.eu{
align-self:flex-end;
flex-direction:row-reverse;
}

.msg.outro{
align-self:flex-start;
}

.msg-avatar{
width:34px;
height:34px;
border-radius:50%;
object-fit:cover;
flex-shrink:0;
border:2px solid #333;
}

.msg.eu .msg-avatar{
border-color:#00c853;
}

.msg-bubble{
padding:10px 14px;
border-radius:12px;
word-break:break-word;
max-width:100%;
}

.eu .msg-bubble{
background:#00c853;
border-bottom-right-radius:4px;
}

.outro .msg-bubble{
background:#333;
border-bottom-left-radius:4px;
}

.msg-nome{
font-size:11px;
color:#aaa;
margin-bottom:3px;
}

.eu .msg-nome{
text-align:right;
}

footer{
display:flex;
gap:10px;
padding:10px;
background:#222;
}

#msg{
flex:1;
padding:12px;
border:none;
border-radius:8px;
font-size:16px;
outline:none;
background:#333;
color:#fff;
}

footer button{
padding:10px 16px;
border:none;
border-radius:8px;
background:#00c853;
color:#fff;
cursor:pointer;
font-weight:bold;
font-size:15px;
}

footer button:hover{
opacity:.9;
}

#headerBtns{
display:flex;
gap:8px;
}

#headerBtns button{
padding:7px 12px;
border:none;
border-radius:8px;
background:rgba(0,0,0,.2);
color:#fff;
cursor:pointer;
font-size:13px;
font-weight:bold;
}
</style>
</head>
<body>

<!-- TELA LOGIN -->
<div id="loginTela">
<div id="loginBox">
<h1>Chat Online</h1>
<p>Escolha um ícone e digite seu nome</p>

<p class="icones-titulo">Escolha seu ícone de perfil:</p>
<div id="iconeGrid">
  <div class="icone-opcao selecionado" data-icone="perfil/icone1.png" onclick="selecionarIcone(this)">
    <img src="perfil/icone1.png" alt="Ícone 1" onerror="this.parentElement.innerHTML='<span style=font-size:30px;line-height:60px>🐱</span>'">
  </div>
  <div class="icone-opcao" data-icone="perfil/icone2.png" onclick="selecionarIcone(this)">
    <img src="perfil/icone2.png" alt="Ícone 2" onerror="this.parentElement.innerHTML='<span style=font-size:30px;line-height:60px>🐶</span>'">
  </div>
  <div class="icone-opcao" data-icone="perfil/icone3.png" onclick="selecionarIcone(this)">
    <img src="perfil/icone3.png" alt="Ícone 3" onerror="this.parentElement.innerHTML='<span style=font-size:30px;line-height:60px>🦊</span>'">
  </div>
  <div class="icone-opcao" data-icone="perfil/icone4.png" onclick="selecionarIcone(this)">
    <img src="perfil/icone4.png" alt="Ícone 4" onerror="this.parentElement.innerHTML='<span style=font-size:30px;line-height:60px>🐻</span>'">
  </div>
</div>

<input type="text" id="nomeInput" placeholder="Seu nome">
<button id="entrarBtn" onclick="salvarNome()">Entrar no Chat</button>
<button id="cancelarBtn" onclick="cancelarEdicao()" style="display:none;width:100%;padding:12px;margin-top:10px;border:2px solid #333;border-radius:10px;font-size:15px;font-weight:bold;background:transparent;color:#aaa;cursor:pointer;">← Cancelar</button>
</div>
</div>

<header>
<div id="headerPerfil">
  <img id="headerAvatar" src="" alt="avatar">
  <span id="titulo"></span>
</div>
<div id="headerBtns">
  <button onclick="trocarNome()">✏️ Nome</button>
</div>
</header>

<div id="chat"></div>

<footer>
<input type="text" id="msg" placeholder="Digite mensagem..." autocomplete="off">
<button onclick="enviar()">➤</button>
</footer>

<script src="chat.js"></script>

</body>
</html>
