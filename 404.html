<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Chat Online</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial, sans-serif;
background:#111;
color:#fff;
display:flex;
flex-direction:column;
height:100vh;
}

header{
background:#00c853;
padding:15px;
text-align:center;
font-size:22px;
font-weight:bold;
}

#chat{
flex:1;
overflow-y:auto;
padding:15px;
display:flex;
flex-direction:column;
gap:10px;
}

.msg{
padding:10px 14px;
border-radius:12px;
max-width:80%;
word-break:break-word;
animation:fade .2s ease;
}

.eu{
background:#00c853;
align-self:flex-end;
}

.outro{
background:#333;
align-self:flex-start;
}

footer{
display:flex;
gap:10px;
padding:10px;
background:#222;
}

input{
flex:1;
padding:12px;
border:none;
border-radius:8px;
font-size:16px;
outline:none;
}

button{
padding:12px 18px;
border:none;
border-radius:8px;
background:#00c853;
color:#fff;
cursor:pointer;
font-weight:bold;
}

button:hover{
opacity:.9;
}

@keyframes fade{
from{
opacity:0;
transform:translateY(10px);
}
to{
opacity:1;
transform:translateY(0);
}
}
</style>
</head>
<body>

<header>Chat Online</header>

<div id="chat"></div>

<footer>
<input type="text" id="msg" placeholder="Digite mensagem..." autocomplete="off">
<button onclick="enviar()">Enviar</button>
</footer>

<script>
const url = "https://swenhgmatpxuqjhdghuv.supabase.co";
const key = "sb_publishable__kkMzLJQtt_My1sPZZ35hw_vpsJV4HN";

const cliente = supabase.createClient(url,key);

const chat = document.getElementById("chat");
const campo = document.getElementById("msg");

let nome = localStorage.getItem("nome");

if(!nome){
nome = prompt("Digite seu nome:");
localStorage.setItem("nome",nome);
}

let mensagensMostradas = new Set();

function mostrar(usuario,texto,id=null){

if(id && mensagensMostradas.has(id)) return;
if(id) mensagensMostradas.add(id);

let div = document.createElement("div");
div.className = "msg " + (usuario === nome ? "eu":"outro");

div.innerHTML = "<b>"+usuario+"</b><br>"+texto;

chat.appendChild(div);
chat.scrollTop = chat.scrollHeight;
}

async function carregar(){

chat.innerHTML = "";
mensagensMostradas.clear();

const {data,error} = await cliente
.from("mensagens")
.select("*")
.order("id",{ascending:true});

if(error) return;

data.forEach(item=>{
mostrar(item.nome,item.texto,item.id);
});
}

async function enviar(){

let texto = campo.value.trim();

if(texto=="") return;

campo.value = "";

mostrar(nome,texto); // aparece instantaneamente

await cliente
.from("mensagens")
.insert([
{
nome:nome,
texto:texto
}
]);
}

campo.addEventListener("keypress",function(e){
if(e.key==="Enter"){
enviar();
}
});

cliente
.channel("sala1")
.on(
"postgres_changes",
{
event:"INSERT",
schema:"public",
table:"mensagens"
},
(payload)=>{
mostrar(
payload.new.nome,
payload.new.texto,
payload.new.id
);
}
)
.subscribe();

carregar();
</script>

</body>
</html>
