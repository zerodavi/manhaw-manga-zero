<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Chat Online</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial,sans-serif;
background:#111;
color:#fff;
display:flex;
flex-direction:column;
height:100vh;
}

/* TELA CADASTRO */
#loginTela{
position:fixed;
inset:0;
background:linear-gradient(135deg,#0f0f0f,#1c1c1c);
display:flex;
justify-content:center;
align-items:center;
z-index:999;
padding:20px;
}

#loginBox{
background:#1f1f1f;
padding:30px;
border-radius:18px;
width:100%;
max-width:360px;
box-shadow:0 0 25px rgba(0,0,0,.5);
text-align:center;
}

#loginBox h1{
font-size:28px;
margin-bottom:10px;
color:#00c853;
}

#loginBox p{
font-size:14px;
color:#aaa;
margin-bottom:20px;
}

#nomeInput{
width:100%;
padding:14px;
border:none;
border-radius:10px;
font-size:16px;
margin-bottom:15px;
outline:none;
}

#entrarBtn{
width:100%;
padding:14px;
border:none;
border-radius:10px;
font-size:16px;
font-weight:bold;
background:#00c853;
color:#fff;
cursor:pointer;
}

#entrarBtn:hover{
opacity:.9;
}

/* CHAT */
header{
background:#00c853;
padding:12px;
display:flex;
justify-content:space-between;
align-items:center;
font-size:20px;
font-weight:bold;
}

#chat{
flex:1;
overflow-y:auto;
padding:15px;
display:flex;
flex-direction:column;
gap:10px;
}

.msg{
padding:10px 14px;
border-radius:12px;
max-width:80%;
word-break:break-word;
}

.eu{
background:#00c853;
align-self:flex-end;
}

.outro{
background:#333;
align-self:flex-start;
}

footer{
display:flex;
gap:10px;
padding:10px;
background:#222;
}

input{
flex:1;
padding:12px;
border:none;
border-radius:8px;
font-size:16px;
outline:none;
}

button{
padding:10px 14px;
border:none;
border-radius:8px;
background:#fff;
color:#111;
cursor:pointer;
font-weight:bold;
}
</style>
</head>
<body>

<!-- TELA LOGIN -->
<div id="loginTela">
<div id="loginBox">
<h1>Chat Online</h1>
<p>Digite seu nome para entrar</p>

<input type="text" id="nomeInput" placeholder="Seu nome">
<button id="entrarBtn" onclick="salvarNome()">Entrar</button>
</div>
</div>

<header>
<span id="titulo"></span>
<button onclick="trocarNome()">Nome</button>
</header>

<div id="chat"></div>

<footer>
<input type="text" id="msg" placeholder="Digite mensagem..." autocomplete="off">
<button onclick="enviar()">Enviar</button>
</footer>

<script>
const url = "https://swenhgmatpxuqjhdghuv.supabase.co";
const key = "sb_publishable__kkMzLJQtt_My1sPZZ35hw_vpsJV4HN";

const cliente = supabase.createClient(url,key);

const chat = document.getElementById("chat");
const campo = document.getElementById("msg");

let nome = localStorage.getItem("nome");

if(nome && nome.trim()!=""){
document.getElementById("loginTela").style.display="none";
iniciarChat();
}

function salvarNome(){

let valor = document.getElementById("nomeInput").value.trim();

if(valor=="") return;

nome = valor;

localStorage.setItem("nome",nome);

document.getElementById("loginTela").style.display="none";

iniciarChat();
}

function trocarNome(){

localStorage.removeItem("nome");
location.reload();
}

function iniciarChat(){

document.getElementById("titulo").innerText = "Chat - " + nome;

carregar();

cliente
.channel("sala1")
.on(
"postgres_changes",
{
event:"INSERT",
schema:"public",
table:"mensagens"
},
(payload)=>{
mostrar(payload.new.nome,payload.new.texto,payload.new.id);
}
)
.subscribe();
}

function mostrar(usuario,texto,id){

if(document.getElementById("msg_"+id)) return;

let div = document.createElement("div");
div.id = "msg_"+id;

div.className = "msg " + (usuario===nome ? "eu":"outro");

div.innerHTML = "<b>"+usuario+"</b><br>"+texto;

chat.appendChild(div);
chat.scrollTop = chat.scrollHeight;
}

async function carregar(){

chat.innerHTML="";

const {data} = await cliente
.from("mensagens")
.select("*")
.order("id",{ascending:true});

data.forEach(item=>{
mostrar(item.nome,item.texto,item.id);
});
}

async function enviar(){

let texto = campo.value.trim();

if(texto=="") return;

campo.value="";

await cliente
.from("mensagens")
.insert([
{
nome:nome,
texto:texto
}
]);
}

campo.addEventListener("keydown",function(e){
if(e.key==="Enter") enviar();
});

document.getElementById("nomeInput").addEventListener("keydown",function(e){
if(e.key==="Enter") salvarNome();
});
</script>

</body>
</html>
