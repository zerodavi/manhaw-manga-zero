<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Chat Online</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
margin:0;
font-family:Arial;
background:#111;
color:#fff;
display:flex;
flex-direction:column;
height:100vh;
}
header{
background:#222;
padding:15px;
text-align:center;
font-size:22px;
font-weight:bold;
}
#chat{
flex:1;
overflow-y:auto;
padding:10px;
display:flex;
flex-direction:column;
gap:10px;
}
.msg{
padding:10px;
border-radius:10px;
max-width:80%;
word-break:break-word;
}
.eu{
background:#00c853;
align-self:flex-end;
}
.outro{
background:#333;
align-self:flex-start;
}
footer{
display:flex;
gap:10px;
padding:10px;
background:#222;
}
input{
flex:1;
padding:12px;
border:none;
border-radius:8px;
font-size:16px;
}
button{
padding:12px 18px;
border:none;
border-radius:8px;
background:#00c853;
color:#fff;
cursor:pointer;
}
</style>
</head>
<body>

<header>Chat Online</header>

<div id="chat"></div>

<footer>
<input type="text" id="msg" placeholder="Digite mensagem">
<button onclick="enviar()">Enviar</button>
</footer>

<script>
const url = "https://swenhgmatpxuqjhdghuv.supabase.co";
const key = "sb_publishable__kkMzLJQtt_My1sPZZ35hw_vpsJV4HN";

const cliente = window.supabase.createClient(url, key);

const chat = document.getElementById("chat");

let nome = localStorage.getItem("nome");

if(!nome){
nome = prompt("Digite seu nome:");
localStorage.setItem("nome", nome);
}

function mostrar(usuario,texto){
let div = document.createElement("div");
div.className = "msg " + (usuario === nome ? "eu":"outro");
div.innerHTML = "<b>"+usuario+"</b><br>"+texto;
chat.appendChild(div);
chat.scrollTop = chat.scrollHeight;
}

async function carregar(){
chat.innerHTML = "";

const { data } = await cliente
.from("mensagens")
.select("*")
.order("id",{ascending:true});

data.forEach(item=>{
mostrar(item.nome,item.texto);
});
}

async function enviar(){
let texto = document.getElementById("msg").value.trim();

if(texto=="") return;

await cliente
.from("mensagens")
.insert([{nome:nome,texto:texto}]);

document.getElementById("msg").value = "";
}

cliente
.channel("sala1")
.on(
"postgres_changes",
{
event:"INSERT",
schema:"public",
table:"mensagens"
},
payload=>{
mostrar(payload.new.nome,payload.new.texto);
}
)
.subscribe();

carregar();
</script>

</body>
</html>
